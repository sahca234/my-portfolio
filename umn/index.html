<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренировка умножения</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Проверка умножения</h1>
        <div class="example">
            <span id="num1">?</span> x <span id="num2">?</span> =
            <input type="number" id="userAnswer" placeholder="Ответ">
        </div>
        <button id="checkBtn">Проверить ответ</button>
        <button id="newExampleBtn" class="hidden">Новый пример</button>
        <div id="stats">
            Правильных: <span id="correctCount">0</span> из <span id="totalCount">0</span>
        </div>
        <div id="result"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
